async function decrypt() {
  const pwd = document.getElementById('pwd').value;
  const err = document.getElementById('err');
  err.style.display = 'none';
  try {
    const salt = Uint8Array.from(atob(E.salt), c => c.charCodeAt(0));
    const iv = Uint8Array.from(atob(E.iv), c => c.charCodeAt(0));
    const tag = Uint8Array.from(atob(E.tag), c => c.charCodeAt(0));
    const data = Uint8Array.from(atob(E.data), c => c.charCodeAt(0));
    const enc = new Uint8Array(data.length + tag.length);
    enc.set(data);
    enc.set(tag, data.length);
    const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(pwd), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, enc);
    const html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    err.style.display = 'block';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}
